.job-image: &job-image ghcr.io/cms-cat/mkdocs-material:latest

.job-script: &job-script
  - export DOCS_DIR=$(python - <<'PY'
from pathlib import Path
import yaml

cfg = {}
mkdocs_yml = Path("mkdocs.yml")
if mkdocs_yml.exists():
    with mkdocs_yml.open() as f:
        cfg = yaml.safe_load(f) or {}
print(cfg.get("docs_dir", "docs"))
PY
    )
  - mkdir -p "$DOCS_DIR"
  - if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi;
  - wget -O header-dropdown.yml https://gitlab.cern.ch/cms-analysis/services/cms-docs-common/-/raw/main/data/header-dropdown.yml
  - wget -O "$DOCS_DIR/CMSlogo_white_nolabel_1024_May2014.png" https://gitlab.cern.ch/cms-analysis/services/cms-docs-common/-/raw/main/CMSlogo_white_nolabel_1024_May2014.png
  - mkdocs build -d public

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - validation
  - pages

validation:
  image: *job-image
  stage: validation
  script: *job-script
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: always

pages:
  image: *job-image
  stage: pages
  script: [*job-script, "if [[ -f _redirects ]]; then cp _redirects public; fi;"]
  artifacts:
    paths:
    - public
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
