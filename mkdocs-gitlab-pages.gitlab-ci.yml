.job-image: &job-image ghcr.io/cms-cat/mkdocs-material:latest

.job-script: &job-script
  - |
      export DOCS_DIR=$(python - <<'PY'
      from ast import literal_eval
      from pathlib import Path
      import re

      docs_dir = "docs"
      mkdocs_yml = Path("mkdocs.yml")
      if mkdocs_yml.exists():
          for line in mkdocs_yml.read_text().splitlines():
              stripped = line.lstrip()
              if not stripped or stripped.startswith("#") or line != stripped:
                  continue

              match = re.match(r"docs_dir\s*:\s*(.*?)\s*(?:#.*)?$", stripped)
              if not match:
                  continue

              value = match.group(1).strip()
              if value and value[0] in {'"', "'"} and value[-1] == value[0]:
                  value = literal_eval(value)
              if value:
                  docs_dir = value
              break

      print(f"Using {docs_dir}")
      PY
      )
      mkdir -p "$DOCS_DIR"
  - if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi;
  - wget -O header-dropdown.yml https://gitlab.cern.ch/cms-analysis/services/cms-docs-common/-/raw/main/data/header-dropdown.yml
  - wget -O "$DOCS_DIR/CMSlogo_white_nolabel_1024_May2014.png" https://gitlab.cern.ch/cms-analysis/services/cms-docs-common/-/raw/main/CMSlogo_white_nolabel_1024_May2014.png
  - mkdocs build -d public

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - validation
  - pages

validation:
  image: *job-image
  stage: validation
  script: *job-script
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: always

pages:
  image: *job-image
  stage: pages
  script: [*job-script, "if [[ -f _redirects ]]; then cp _redirects public; fi;"]
  artifacts:
    paths:
    - public
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
